name: Actualizar fondos Hencorp
on:
  schedule:
    - cron: "0 11 * * *"   # 11:00 UTC = 05:00 El Salvador, todos los días
  workflow_dispatch: {}
permissions:
  contents: write
concurrency:
  group: actualizar-fondos
  cancel-in-progress: false
jobs:
  actualizar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Instalar dependencias
        run: pip install -r requirements.txt
      - name: Ejecutar robot
        run: python scraper.py
      - name: Commit si hay cambios
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "Sin cambios hoy."
          else
            git commit -m "Actualización automática: datos al $(date -u +%F)"
            git push
          fi
